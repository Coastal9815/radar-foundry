# MRW: reuse one SSH connection per destination (cuts TIME_WAIT / ephemeral port exhaustion).
# Install once on wx-core:  ./bin/install_ssh_multiplex_mrw.sh
#
# Requires: mkdir -p ~/.ssh/sockets  (done by installer)

Host wx-i9 192.168.2.2
  HostName 192.168.2.2
  User scott
  ControlMaster auto
  ControlPath ~/.ssh/sockets/cm-wx-i9-%C
  ControlPersist 600
  ServerAliveInterval 30
  ServerAliveCountMax 4

# Lightning-PC (NexStorm) — same pattern for high-frequency ssh/scp from wx-core
Host 192.168.2.223
  User scott
  ControlMaster auto
  ControlPath ~/.ssh/sockets/cm-lightning-%C
  ControlPersist 600
  ServerAliveInterval 30
  ServerAliveCountMax 4
